<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" role="img" aria-labelledby="title desc">
  <title id="title">Forever mood memory</title>
  <desc id="desc">Glowing forever symbol with roses, stars, and premium gold light.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#211229"/>
      <stop offset=".45" stop-color="#7c4dff"/>
      <stop offset="1" stop-color="#ff78aa"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#fff1aa"/>
      <stop offset="1" stop-color="#f3c969"/>
    </linearGradient>
    <filter id="glow">
